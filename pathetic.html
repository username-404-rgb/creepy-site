<!DOCTYPE html>
<html lang="en-AU">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width-device-width, initial-scale-1.0">
        <title>HTML 5 Boilerplate</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <img src="images\Vent_2.png", alt="An Old Memory", width="66%", class="entry">
        <a href="pathetic.html">
            <img src="images\Invisible.png", alt="Come In", width="15%", class="vent2">
        <a id="unlockLink" href="#"> I don't know why i couldnt just do better
        <a id="targetLink" href="#" class="disabled1 hidden1"> This is it, it's garbage, I hate it
        </a>
    <script> // Lock Section
        const targetLink = document.getElementById('targetLink');
        if (sessionStorage.getItem('linkUnlocked') === 'true') {
            enableTargetLink();
        }
        unlockLink.addEventListener('click', function(event) {
            event.preventDefault(); 
            sessionStorage.setItem('linkUnlocked', 'true');
            enableTargetLink();
        });
        function enableTargetLink() {
            targetLink.classList.remove('disabled1', 'hidden1');
        }
    </script>
    <script> // Key Section
        const unlockLink = document.getElementById('unlockLink');
        if (sessionStorage.getItem('linkUnlocked') === 'true') {
            disableAndHideUnlockLink();
        }
        unlockLink.addEventListener('click', function(event) {
            event.preventDefault(); 
            sessionStorage.setItem('linkUnlocked', 'true');
            disableAndHideUnlockLink();
        });

        function disableAndHideUnlockLink() {
            unlockLink.classList.add('disabled1', 'hidden1');
            unlockLink.style.pointerEvents = 'none';
        }
    </script>
    </body>
</html>
