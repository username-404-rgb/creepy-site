<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width-device-width, initial-scale-1.0">
    <title>HTML 5 Boilerplate</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a id="targetLink" href="exterior.html" class="disabled">
        <img src="images/Invisible.png" alt="Come In" width="6%" class="enter_vent"> 
    </a>
    <br><br>
    <a id="unlockLink" href="#">
        <img src="images/Bathroom.png" alt="Come In" width="6%" class="Backwards"> 
    </a>

    <script>
        const targetLink = document.getElementById('targetLink');
        const unlockLink = document.getElementById('unlockLink');
        if (sessionStorage.getItem('linkUnlocked') === 'true') {
            enableTargetLink();
            disableAndHideUnlockLink();
        }
        unlockLink.addEventListener('click', function(event) {
            event.preventDefault(); 
            sessionStorage.setItem('linkUnlocked', 'true');
            enableTargetLink();
            disableAndHideUnlockLink();
        });
        function enableTargetLink() {
            targetLink.classList.remove('disabled');
        }
        function disableAndHideUnlockLink() {
            unlockLink.classList.add('disabled', 'hidden');
            unlockLink.style.pointerEvents = 'none';
        }
    </script>
</body>
</html>
