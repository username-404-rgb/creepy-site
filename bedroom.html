<!DOCTYPE html>
<html lang="en-AU">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width-device-width, initial-scale-1.0">
        <title>HTML 5 Boilerplate</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <img src="images\Bedroom.png", alt="An Old Memory", width="71%", class="entry">
        <a href="upstairs.html">
            <img src="images\Arrow_D.png", alt="Come In", width="5%", class="backwards"> 
        </a></br>
        <a id="unlockLink" href="#">
            <img src="images/Switch.png" alt="Come In" width="2%" class="switch"> 
        </a>

    <script> // Key Section
        const unlockLink = document.getElementById('unlockLink');
        if (sessionStorage.getItem('linkUnlocked') === 'true') {
            disableAndHideUnlockLink();
        }
        unlockLink.addEventListener('click', function(event) {
            event.preventDefault(); 
            sessionStorage.setItem('linkUnlocked', 'true');
            disableAndHideUnlockLink();
        });

        function disableAndHideUnlockLink() {
            unlockLink.classList.add('disabled1', 'hidden1');
            unlockLink.style.pointerEvents = 'none';
        }
    </script>

    </body>
</html>
